aid: merit-systems-protection-board
name: Merit Systems Protection Board
description: >-
  The Merit Systems Protection Board (MSPB) is an independent quasi-judicial
  agency that protects federal merit systems against partisan political and
  other prohibited personnel practices. It safeguards the rights of federal
  employees and adjudicates employee appeals.
